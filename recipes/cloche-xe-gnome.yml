name: cloche-xe-gnome
description: Workstation Extended
base-image: ghcr.io/ublue-os/bazzite-gnome
image-version: 43 #stable #Bazzite doesn't use latest.

modules:
  - type: os-release
    properties:
      ID: cloche-xe
      NAME: Cloche Xe
      PRETTY_NAME: Cloche Xe 43 (Felt)
      LOGO: system-logo-white
      HOME_URL: https://github.com/augustofmarques/gnx
      BUG_REPORT_URL: https://github.com/augustofmarques/gnx/issues
      SUPPORT_URL: https://github.com/augustofmarques/gnx
      DEFAULT_HOSTNAME: cloche-xe

  - type: rpm-ostree
    install:
      - firefox
      - firefox-langpacks

  - type: script
    scripts:
      - install-common-packages.sh
      - install-gnome-packages.sh
 
  - type: files
    files:
      - source: common
        destination: /
      - source: cloche-xe
        destination: /
      - source: gnome
        destination: /

  - type: dnf
    install:
      packages:
        - plymouth-plugin-script

  - type: kargs
    kargs:
      - quiet
      - splash
      - rhgb # Red Hat Graphical Boot
      - rd.udev.log_priority=3
      - vt.global_cursor_default=0
      - systemd.show_status=auto
      - plymouth.theme=spinner

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - com.vscodium.codium
          - io.gitlab.librewolf-community
          - org.kde.ark
          - io.bassi.Amberol
          - org.localsend.localsend_app
          #- org.mozilla.firefox
          - com.mattjakeman.ExtensionManager
          - com.vscodium.codium
          - io.gitlab.librewolf-community
          - io.bassi.Amberol
          - org.localsend.localsend_app
          - org.gnome.Calculator
          - org.gnome.Loupe

  - type: systemd
    system:
      enabled:
        - cockpit.socket
      # DO NOT mask services here (Bazzite needs them for gamemode/updates)
      masked:
        - plymouth-quit-wait.service # optional: Speeds up boot visually
      disabled:
        - bazzite-user-setup.service

  - type: script
    scripts:
      #- install-common-packages.sh
      #- install-gnome-packages.sh
      - setup-cloche-xe-gnome.sh

  - type: initramfs

  - type: signing
