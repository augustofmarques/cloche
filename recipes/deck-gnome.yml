name: cloche-xe-deck
description: Workstation Extended Deck Edition
base-image: ghcr.io/ublue-os/bazzite-deck-gnome
image-version: 43 #stable

modules:
  - type: os-release
    properties:
      ID: cloche-xe-deck
      NAME: Cloche Xe Deck
      PRETTY_NAME: Cloche Xe 43 Felt
      HOME_URL: https://github.com/augustofmarques/gnx
      BUG_REPORT_URL: https://github.com/augustofmarques/gnx/issues
      SUPPORT_URL: https://github.com/augustofmarques/gnx
      DEFAULT_HOSTNAME: cloche-xe

  - type: rpm-ostree
    install:
      - cockpit
      - git
      - distrobox
      - zsh
      - btop
      - firefox
      - firefox-langpacks
      - gnome-tweaks
      - gnome-shell-extension-dash-to-panel
      - gnome-shell-extension-blur-my-shell
      - gnome-shell-extension-caffeine

  - type: files
    files:
      - source: common
        destination: /
      - source: deck
        destination: /
      - source: gnome
        destination: /

  - type: dnf
    install:
      packages:
        - plymouth-plugin-script

  - type: kargs
    kargs:
      - plymouth.theme=spinner

    #remove:
    #  -

  - type: systemd
    system:
      enabled:
        - cockpit.socket

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - dev.zed.Zed
          - io.gitlab.librewolf-community
          - org.kde.ark
          - io.bassi.Amberol
          - org.localsend.localsend_app
          #- org.mozilla.firefox
          - com.mattjakeman.ExtensionManager
          - dev.zed.Zed
          - io.gitlab.librewolf-community
          - io.bassi.Amberol
          - org.localsend.localsend_app
          - org.gnome.Calculator
          - org.gnome.Loupe

  - type: script
    scripts:
      - S

  - type: initramfs

  - type: signing
