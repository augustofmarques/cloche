name: cloche-xe-deck
description: Workstation Extended Deck Edition
base-image: ghcr.io/ublue-os/bazzite-deck
image-version: stable

modules:
  - type: os-release
    properties:
      ID: cloche-xe-deck
      NAME: Cloche Xe Deck
      PRETTY_NAME: Cloche Xe Deck
      HOME_URL: https://github.com/augustofmarques/gnx
      BUG_REPORT_URL: https://github.com/augustofmarques/gnx/issues
      SUPPORT_URL: https://github.com/augustofmarques/gnx
      DEFAULT_HOSTNAME: cloche-xe

  - type: files
    files:
      - source: common
        destination: /
      - source: deck
        destination: /
      - source: system
        destination: /

  - type: rpm-ostree
    install:
      - cockpit
      - git
      - distrobox
      - zsh
      - btop

  - type: dnf
    install:
      packages:
        - plymouth-plugin-script

    #remove:
    #  -

  - type: systemd
    system:
      enabled:
        - cockpit.socket

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - dev.zed.Zed
          - org.blender.Blender
          - io.gitlab.librewolf-community
          - it.mijorus.gearlever
          - io.bassi.Amberol
          - org.localsend.localsend_app

  - type: signing

  - type: script
    scripts:
      - setup-cloche-xe-deck.sh

  - type: initramfs
