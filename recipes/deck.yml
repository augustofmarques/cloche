name: gnx-deck
description: Steam Deck Bazzite Mod
base-image: ghcr.io/ublue-os/bazzite-deck
image-version: stable

modules:
  # Descomente se os arquivos existirem
  - type: files
    files:
      - source: common
        destination: /
      - source: deck # <--- ESSA LINHA EXISTE?
        destination: /

  - type: rpm-ostree
    install:
      - cockpit
      - git
      - distrobox
      - zsh
      - btop

    #remove:
    #  - waydroid
    #  - waydroid-selinux # <--- Adicione isso!
    #  - waydroid-dl-libgbinder # Aqui PODE remover, pq Bazzite tem Waydroid.

  - type: systemd
    system:
      enabled:
        - cockpit.socket

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - dev.zed.Zed
          - org.blender.Blender
          - io.gitlab.librewolf-community
          - it.mijorus.gearlever
          - io.bassi.Amberol

  # No Deck, deixamos o tema do Bazzite que é bonito,
  # ou usa o spinner se quiser padronizar.
  #- type: plymouth
  #  packagename: plymouth-theme-spinner

  - type: signing

  - type: script
    scripts:
      - setup-workstation-xe-deck.sh # Nome do script que está na pasta 'scripts/'
