name: cloche-xe-deck
description: Workstation Extended Deck Edition
base-image: ghcr.io/ublue-os/bazzite-deck
image-version: testing #stable

modules:
  - type: os-release
    properties:
      ID: cloche-xe-deck
      NAME: Cloche Xe Deck
      PRETTY_NAME: Cloche Xe 43 (Felt)
      HOME_URL: https://github.com/augustofmarques/gnx
      BUG_REPORT_URL: https://github.com/augustofmarques/gnx/issues
      SUPPORT_URL: https://github.com/augustofmarques/gnx
      DEFAULT_HOSTNAME: cloche-xe

  - type: rpm-ostree
    install:
      - firefox
      - firefox-langpacks
      - tailscale

  - type: script
    scripts:
      - install-common-packages.sh

  - type: files
    files:
      - source: common
        destination: /
      - source: deck
        destination: /
      - source: kde
        destination: /

  - type: dnf
    install:
      packages:
        - plymouth-plugin-script

  - type: kargs
    kargs:
      - plymouth.theme=spinner

    #remove:
    #  -

  - type: systemd
    system:
      enabled:
        - cockpit.socket

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.vscodium.codium
          - org.blender.Blender
          - io.gitlab.librewolf-community
          - it.mijorus.gearlever
          - io.bassi.Amberol
          - org.localsend.localsend_app
        #  - org.mozilla.firefox

  - type: script
    scripts:
      #- install-common-packages.sh
      - setup-cloche-xe-deck.sh

  - type: initramfs

  - type: signing
