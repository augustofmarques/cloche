name: cloche-standard
description: Standard
base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  - type: os-release
    properties:
      ID: cloche
      NAME: Cloche
      PRETTY_NAME: Cloche
      HOME_URL: https://github.com/augustofmarques/gnx
      BUG_REPORT_URL: https://github.com/augustofmarques/gnx/issues
      SUPPORT_URL: https://github.com/augustofmarques/gnx
      DEFAULT_HOSTNAME: cloche

  - type: files
    files:
      - source: common
        destination: /
      - source: standard
        destination: /
      - source: kde
        destination: /

  - type: rpm-ostree
    install:
      - cockpit
      - git
      - distrobox
      - zsh
      - btop
      - docker
      - plymouth-theme-spinner
      - fastfetch
      #- ffmpeg
      #- gstreamer1-plugin-libav
      # gstreamer1-plugins-bad-free-extras
      #- gstreamer1-plugins-ugly-free

  - type: dnf
    install:
      packages:
        - plymouth-plugin-script

    #remove:
    #- htop Commented out due to some issues removing packages on some
    # upstream images.

  - type: kargs
    kargs:
      - nowatchdog # Turns of freeze checking
      #- modprobe.blacklist=iTCO_wdt # Turns off watchdog Intel driver
      - random.trust_cpu=on # Speeds up initial encryption
      - console=tty0 # Main console focus, ignore serials
      - quiet # Self explanatory
      - splash # Guarantees boot animation for desktop images, may be unecessary
      - rhgb
      - rd.udev.log_priority=3 # Hide hardware logs (systemd-udev)
      - vt.global_cursor_default=0 # Hides cursor
      - systemd.show_status=auto # Only show status if critical error occurs

  - type: systemd
    system:
      enabled:
        - cockpit.socket
      masked:
        # Masks some services in order to get faster boot
        # times on desktop based images.
        - NetworkManager-wait-online.service
        - plymouth-quit-wait.service
        - gssproxy.service
        - rpc-gssd.service

        #- ModemManager.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - dev.zed.Zed
          - io.gitlab.librewolf-community
          - org.kde.ark
          - it.mijorus.gearlever
          #- io.github.kolunmi.Bazaar
          - org.kde.gwenview
          - io.bassi.Amberol
          - io.github.shonebinu.Brief
          - org.localsend.localsend_app

  - type: script
    scripts:
      - setup-cloche-standard.sh # Located at 'scripts/'

  - type: initramfs

  - type: signing
