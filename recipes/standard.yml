name: cloche-standard
description: Standard
base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44 #latest

modules:
  - type: os-release
    properties:
      ID: cloche
      NAME: Cloche
      PRETTY_NAME: Cloche 44 (Envy)
      HOME_URL: https://github.com/augustofmarques/gnx
      BUG_REPORT_URL: https://github.com/augustofmarques/gnx/issues
      SUPPORT_URL: https://github.com/augustofmarques/gnx
      DEFAULT_HOSTNAME: cloche

  - type: files
    files:
      - source: common
        destination: /
      - source: standard
        destination: /
      - source: kde
        destination: /

#  - type: rpm-ostree
#    install:
  - type: script
    scripts:
      - install-common-packages.sh
      - install-standard-packages.sh


  - type: dnf
    install:
      packages:
        - plymouth-plugin-script

    #remove:
    

  - type: kargs
    kargs:
      - nowatchdog # Turns of freeze checking
      - random.trust_cpu=on
      - console=tty0
      - quiet 
      - splash
      - rhgb
      - rd.udev.log_priority=3 
      - vt.global_cursor_default=0
      - systemd.show_status=auto

  - type: systemd
    system:
      enabled:
        - cockpit.socket
      masked:
        # Masks some services in order to get faster boot
        # times on desktop based images.
        - NetworkManager-wait-online.service
        - plymouth-quit-wait.service
        - gssproxy.service
        - rpc-gssd.service

        #- ModemManager.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.vscodium.codium
          #- io.gitlab.librewolf-community
          - org.kde.ark
          - it.mijorus.gearlever
          #- io.github.kolunmi.Bazaar
          - org.kde.gwenview
          - io.bassi.Amberol
          - io.github.shonebinu.Brief
          - org.localsend.localsend_app

  - type: script
    scripts:
      #- install-common-packages.sh
      #- install-standard-packages.sh
      - setup-cloche-standard.sh

  - type: initramfs

  - type: signing
