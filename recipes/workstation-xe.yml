name: gnx-workstation-xe
description: Workstation High-End (Base Bazzite)
base-image: ghcr.io/ublue-os/bazzite # Use 'bazzite-nvidia' se tiver placa verde!
image-version: stable # Bazzite usa 'stable' (segue o Fedora atual)

modules:
  - type: files
    files:
      - source: common # Pega Wallpaper, Fontes, Plasma Configs
        destination: /
      - source: workstation-xe # Pega o nome "GNX XE"
        destination: /

  - type: rpm-ostree
    install:
      # Bazzite JA VEM com codecs, drivers, lutris, steam, etc.
      # Só instale o que falta pra trabalho.
      - cockpit
      - git
      - distrobox
      - zsh
      - btop
      # Não precisa de ffmpeg/gstreamer aqui
      #
  - type: kargs
    kargs:
      - quiet # Cala a boca do Kernel
      - splash # Mostra a tela de carregamento (Plymouth)
      - rhgb # Red Hat Graphical Boot (essencial para o spinner)
      - rd.udev.log_priority=3 # Esconde logs de hardware (systemd-udev)
      - vt.global_cursor_default=0 # Esconde o cursor piscando no canto
      - systemd.show_status=auto # Só mostra texto se algo der erro crítico

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - dev.zed.Zed
          - io.gitlab.librewolf-community
          - org.kde.ark
          - io.bassi.Amberol
          # O Bazzite já traz Steam, Lutris, etc via Portal.

  - type: systemd
    system:
      enabled:
        - cockpit.socket
      # NÃO mascare serviços de rede aqui (Bazzite precisa deles pro gamemode/updates)
      masked:
        - plymouth-quit-wait.service # Opcional: Acelera o boot visualmente

  - type: signing

  - type: script
      scripts:
        - setup-workstation-xe.sh  # Nome do script que está na pasta 'scripts/'
