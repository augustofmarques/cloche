name: gnx-workstation
description: Workstation
base-image: ghcr.io/ublue-os/kinoite-main
image-version: main # Kinoite usa numeros (Fedora 41)

modules:
  # Descomente ISSO se o comando 'ls' mostrou os arquivos lá na pasta
  - type: files
    files:
      - source: system
        destination: /

  - type: rpm-ostree
    install:
      - git
      - distrobox
      - zsh
      - btop
      # Codecs para o notebook antigo rodar vídeos bem
      - ffmpeg
      - gstreamer1-plugin-libav
      - gstreamer1-plugins-bad-free-extras
      - gstreamer1-plugins-ugly-free

    remove:
      - firefox # Removemos o firefox padrao pra usar o flatpak/librewolf
      - firefox-langpacks
      # Removi 'waydroid' daqui pois Kinoite NAO tem waydroid, ia dar erro.

  - type: systemd
    system:
      enabled:
        - cockpit.socket

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - dev.zed.Zed
          - io.gitlab.librewolf-community
          - org.kde.ark # Essencial para abrir zips no Dolphin

  - type: signing
