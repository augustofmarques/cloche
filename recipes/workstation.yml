name: gnx-workstation
description: Workstation
base-image: ghcr.io/ublue-os/aurora
image-version: latest # Kinoite usa numeros (Fedora 41)

modules:
  # Descomente ISSO se o comando 'ls' mostrou os arquivos lá na pasta
  - type: files
    files:
      - source: system
        destination: /

  - type: rpm-ostree
    install:
      - cockpit
      - git
      - distrobox
      - zsh
      - btop
      # Codecs para o notebook antigo rodar vídeos bem
      #- ffmpeg
      #- gstreamer1-plugin-libav
      # gstreamer1-plugins-bad-free-extras
      #- gstreamer1-plugins-ugly-free

    remove:
      #- firefox # Removemos o firefox padrao pra usar o flatpak/librewolf
      #- firefox-langpacks
      # Removi 'waydroid' daqui pois Kinoite NAO tem waydroid, ia dar erro.
      - htop

  # 1. Otimizações do Kernel (Boot Rápido)
  - type: kargs
    args:
      - nowatchdog # Desliga checagem de travamento (ganha tempo)
      - modprobe.blacklist=iTCO_wdt # Desliga driver de watchdog Intel desnecessário
      - random.trust_cpu=on # Acelera a criptografia inicial
      - console=tty0 # Foca no console principal, ignora seriais
      - quiet # Menos texto na tela
      - splash # Garante a animação (se tiver plymouth)

  - type: systemd
    system:
      enabled:
        - cockpit.socket
      masked:
        # A Tríade da Espera (Mata o delay de rede)
        - NetworkManager-wait-online.service
        - plymouth-quit-wait.service
        - gssproxy.service
        - rpc-gssd.service
        # Se você não usa modem 3G/4G no note, mate esse também:
        #- ModemManager.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - dev.zed.Zed
          - io.gitlab.librewolf-community
          - org.kde.ark # Essencial para abrir zips no Dolphin
          - it.mijorus.gearlever

  - type: signing
